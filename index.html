<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>숫자 키우기</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --dim: #8b949e;
    --accent: #58a6ff;
    --gold: #e3b341;
    --green: #3fb950;
    --red: #f85149;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  .container { width: 100%; max-width: 640px; }

  .big-number {
    text-align: center;
    font-size: clamp(2rem, 8vw, 3.5rem);
    font-weight: bold;
    padding: 30px 0 6px;
    color: var(--text);
    text-shadow: 0 0 20px rgba(88, 166, 255, 0.3);
    user-select: none;
    word-break: break-all;
  }
  .per-sec {
    text-align: center;
    color: var(--dim);
    margin-bottom: 20px;
    font-size: 0.95rem;
  }

  #clickBtn {
    display: block;
    width: 100%;
    padding: 22px;
    font-size: 1.2rem;
    font-family: inherit;
    background: linear-gradient(180deg, #1f6feb, #1158c7);
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    margin-bottom: 14px;
    transition: transform 0.05s;
  }
  #clickBtn:active { transform: scale(0.97); }

  /* 보유 현황 바 */
  #statusBar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 20px;
    min-height: 42px;
    align-items: center;
  }
  #statusBar .badge {
    font-size: 0.95rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px 8px;
    user-select: none;
  }
  #statusBar .badge .lv { color: var(--accent); font-size: 0.8rem; }
  #statusBar .empty { color: var(--dim); font-size: 0.8rem; }

  /* 탭 */
  .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
  .tab-btn {
    flex: 1;
    padding: 12px;
    font-family: inherit;
    font-size: 1rem;
    background: var(--panel);
    color: var(--dim);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
  }
  .tab-btn.active {
    color: var(--text);
    border-color: var(--accent);
    background: #1c2431;
  }

  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.15s, opacity 0.15s;
    user-select: none;
  }
  .row:hover { border-color: var(--accent); }
  .row.locked { opacity: 0.45; cursor: not-allowed; }
  .row.locked:hover { border-color: var(--border); }
  .row.bought { opacity: 0.55; cursor: default; border-color: var(--green); }
  .row.bought:hover { border-color: var(--green); }
  .row .name { font-size: 1rem; }
  .row .detail { font-size: 0.8rem; color: var(--dim); margin-top: 3px; }
  .row .right { text-align: right; }
  .row .cost { color: var(--gold); font-size: 0.9rem; }
  .row.bought .cost { color: var(--green); }
  .row .sub { color: var(--accent); font-size: 0.8rem; margin-top: 3px; }
  .hidden { display: none !important; }

  .footer {
    text-align: center;
    margin: 30px 0 10px;
    font-size: 0.75rem;
    color: var(--dim);
  }
  .footer button {
    background: none;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: inherit;
    font-size: 0.75rem;
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    margin: 0 4px;
  }
  .footer button:hover { color: var(--red); border-color: var(--red); }

  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--panel);
    border: 1px solid var(--accent);
    padding: 12px 24px;
    border-radius: 10px;
    font-size: 0.9rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    max-width: 90vw;
    text-align: center;
    z-index: 20;
  }
  #toast.show { opacity: 1; }

  .float-num {
    position: fixed;
    color: var(--accent);
    font-weight: bold;
    pointer-events: none;
    animation: floatUp 0.8s ease-out forwards;
    z-index: 10;
  }
  .float-num.crit {
    color: var(--gold);
    font-size: 1.5rem;
    text-shadow: 0 0 12px var(--gold);
    animation: floatUp 1.1s ease-out forwards;
  }
  @keyframes floatUp {
    from { opacity: 1; transform: translateY(0); }
    to { opacity: 0; transform: translateY(-60px); }
  }
</style>
</head>
<body>
<div class="container">
  <div class="big-number" id="number">0</div>
  <div class="per-sec"><span id="perSec">0</span>/초 · 클릭 +<span id="clickPower">1</span></div>

  <button id="clickBtn">CLICK</button>

  <div id="statusBar"></div>

  <div class="tabs">
    <button class="tab-btn active" id="tabLevel">⬆️ 레벨업</button>
    <button class="tab-btn" id="tabShop">🛒 상점</button>
  </div>

  <div id="levelList"></div>
  <div id="shopList" class="hidden"></div>

  <div class="footer">
    자동 저장됨 · <button id="exportBtn">내보내기</button><button id="resetBtn">전체 초기화</button>
  </div>
</div>
<div id="toast"></div>

<script>
'use strict';

// ---------- 데이터 정의 ----------
const STATS = [
  { emoji: '⚡', name: '오버클럭',  desc: lv => `클릭당 +1 (현재 +${lv})`,                         base: 10,   growth: 1.5 },
  { emoji: '📈', name: '증폭기',    desc: lv => `클릭 배율 +25%/lv (현재 x${(1 + lv * 0.25).toFixed(2)})`, base: 100,  growth: 1.8 },
  { emoji: '🎰', name: '잭팟 회로', desc: lv => `크리티컬 x10, 확률 +2%/lv (현재 ${Math.min(lv * 2, 50)}%)`, base: 500,  growth: 2.0, maxLv: 25 },
  { emoji: '🔗', name: '동기화',    desc: lv => `클릭에 초당 생산의 +5%/lv (현재 +${lv * 5}%)`,    base: 5e3,  growth: 2.4 },
];

const ITEMS = [
  { emoji: '✏️', name: '연필',        cost: 50,    rate: 1 },
  { emoji: '🧮', name: '주판',        cost: 400,   rate: 6 },
  { emoji: '⏰', name: '자명종',      cost: 3e3,   rate: 35 },
  { emoji: '📟', name: '계산기',      cost: 2.5e4, rate: 250 },
  { emoji: '💾', name: '고물 컴퓨터', cost: 2e5,   rate: 1.8e3 },
  { emoji: '🤖', name: '로봇 조수',   cost: 1.5e6, rate: 1.2e4 },
  { emoji: '🏭', name: '숫자 공장',   cost: 1.2e7, rate: 9e4 },
  { emoji: '🛰️', name: '위성 네트워크', cost: 1.5e8, rate: 6e5 },
  { emoji: '🧠', name: '인공지능',    cost: 2e9,   rate: 6e6 },
  { emoji: '⚛️', name: '양자 컴퓨터', cost: 3e10,  rate: 7e7 },
  { emoji: '🌌', name: '은하 연산망', cost: 1e12,  rate: 1.5e9 },
  { emoji: '♾️', name: '무한 엔진',   cost: 5e13,  rate: 3e10 },
];

const CRIT_MULT = 10;

// ---------- 상태 ----------
let S = {
  num: 0,
  total: 0,
  clicks: 0,
  stats: STATS.map(() => 0),
  items: ITEMS.map(() => false),
  lastTick: Date.now(),
};

// ---------- 숫자 포맷 ----------
function fmt(n) {
  return Math.floor(n).toLocaleString('en-US');
}

// ---------- 계산 ----------
function statCost(i) {
  return Math.floor(STATS[i].base * Math.pow(STATS[i].growth, S.stats[i]));
}

function perSec() {
  let total = 0;
  for (let i = 0; i < ITEMS.length; i++) {
    if (S.items[i]) total += ITEMS[i].rate;
  }
  return total;
}

function critChance() {
  return Math.min(S.stats[2] * 0.02, 0.5);
}

function clickPower() {
  const base = 1 + S.stats[0];               // 오버클럭
  const mult = 1 + S.stats[1] * 0.25;        // 증폭기
  const synergy = perSec() * S.stats[3] * 0.05; // 동기화
  return base * mult + synergy;
}

function gain(amount) {
  S.num += amount;
  S.total += amount;
}

// ---------- DOM 구축 ----------
const $ = id => document.getElementById(id);
const statEls = [], itemEls = [];

STATS.forEach((st, i) => {
  const el = document.createElement('div');
  el.className = 'row';
  el.innerHTML = `
    <div>
      <div class="name">${st.emoji} ${st.name} <span class="sub lv-text"></span></div>
      <div class="detail"></div>
    </div>
    <div class="right"><div class="cost"></div></div>`;
  el.onclick = () => buyStat(i);
  $('levelList').appendChild(el);
  statEls.push({
    root: el,
    lv: el.querySelector('.lv-text'),
    detail: el.querySelector('.detail'),
    cost: el.querySelector('.cost'),
  });
});

ITEMS.forEach((it, i) => {
  const el = document.createElement('div');
  el.className = 'row';
  el.innerHTML = `
    <div>
      <div class="name">${it.emoji} ${it.name}</div>
      <div class="detail">+${fmt(it.rate)}/초 자동 생산</div>
    </div>
    <div class="right"><div class="cost"></div></div>`;
  el.onclick = () => buyItem(i);
  $('shopList').appendChild(el);
  itemEls.push({ root: el, cost: el.querySelector('.cost') });
});

// ---------- 액션 ----------
function buyStat(i) {
  const st = STATS[i];
  if (st.maxLv && S.stats[i] >= st.maxLv) return;
  const cost = statCost(i);
  if (S.num < cost) return;
  S.num -= cost;
  S.stats[i]++;
  render();
}

function buyItem(i) {
  if (S.items[i] || S.num < ITEMS[i].cost) return;
  S.num -= ITEMS[i].cost;
  S.items[i] = true;
  render();
  toast(`${ITEMS[i].emoji} ${ITEMS[i].name} 획득! +${fmt(ITEMS[i].rate)}/초`);
}

$('clickBtn').onclick = (e) => {
  const crit = Math.random() < critChance();
  const p = clickPower() * (crit ? CRIT_MULT : 1);
  gain(p);
  S.clicks++;
  const f = document.createElement('div');
  f.className = 'float-num' + (crit ? ' crit' : '');
  f.textContent = (crit ? '💥 +' : '+') + fmt(p);
  f.style.left = (e.clientX + (Math.random() * 40 - 20)) + 'px';
  f.style.top = (e.clientY - 20) + 'px';
  document.body.appendChild(f);
  setTimeout(() => f.remove(), 1100);
  render();
};

// 탭 전환
function switchTab(shop) {
  $('tabLevel').classList.toggle('active', !shop);
  $('tabShop').classList.toggle('active', shop);
  $('levelList').classList.toggle('hidden', shop);
  $('shopList').classList.toggle('hidden', !shop);
}
$('tabLevel').onclick = () => switchTab(false);
$('tabShop').onclick = () => switchTab(true);

$('resetBtn').onclick = () => {
  if (!confirm('전체 초기화. 진짜 진행?')) return;
  localStorage.removeItem('numgame2');
  location.reload();
};

$('exportBtn').onclick = () => {
  navigator.clipboard.writeText(btoa(JSON.stringify(S)))
    .then(() => toast('세이브 클립보드 복사됨'));
};

// ---------- 렌더 ----------
function render() {
  $('number').textContent = fmt(S.num);
  $('perSec').textContent = fmt(perSec());
  $('clickPower').textContent = fmt(clickPower());

  // 능력치 목록
  STATS.forEach((st, i) => {
    const e = statEls[i];
    const lv = S.stats[i];
    const maxed = st.maxLv && lv >= st.maxLv;
    e.lv.textContent = `Lv.${lv}`;
    e.detail.textContent = st.desc(lv);
    e.cost.textContent = maxed ? 'MAX' : fmt(statCost(i));
    e.root.classList.toggle('locked', !maxed && S.num < statCost(i));
    e.root.classList.toggle('bought', !!maxed);
  });

  // 상점 목록
  ITEMS.forEach((it, i) => {
    const e = itemEls[i];
    const bought = S.items[i];
    // 공개: 첫 아이템이거나 직전 구매 or 누적 30% 도달
    const visible = bought || i === 0 || S.items[i - 1] || S.total >= it.cost * 0.3;
    e.root.classList.toggle('hidden', !visible);
    if (!visible) return;
    e.cost.textContent = bought ? '보유중' : fmt(it.cost);
    e.root.classList.toggle('bought', bought);
    e.root.classList.toggle('locked', !bought && S.num < it.cost);
  });

  // 보유 현황 바
  const badges = [];
  STATS.forEach((st, i) => {
    if (S.stats[i] > 0) badges.push(`<span class="badge">${st.emoji}<span class="lv">${S.stats[i]}</span></span>`);
  });
  ITEMS.forEach((it, i) => {
    if (S.items[i]) badges.push(`<span class="badge" title="${it.name}">${it.emoji}</span>`);
  });
  $('statusBar').innerHTML = badges.length
    ? badges.join('')
    : '<span class="empty">아직 아무것도 없음 — 클릭해서 숫자를 모으자</span>';
}

// ---------- 루프 & 저장 ----------
function tick() {
  const now = Date.now();
  const dt = (now - S.lastTick) / 1000;
  S.lastTick = now;
  gain(perSec() * Math.min(dt, 60 * 60 * 12)); // 오프라인 최대 12시간
  render();
}

function save() {
  S.lastTick = Date.now();
  localStorage.setItem('numgame2', JSON.stringify(S));
}

function load() {
  const raw = localStorage.getItem('numgame2');
  if (!raw) return;
  try {
    const d = JSON.parse(raw);
    S = { ...S, ...d };
    while (S.stats.length < STATS.length) S.stats.push(0);
    while (S.items.length < ITEMS.length) S.items.push(false);
    const away = (Date.now() - S.lastTick) / 1000;
    if (away > 10) {
      const earned = perSec() * Math.min(away, 60 * 60 * 12);
      if (earned > 0) {
        gain(earned);
        toast(`오프라인 수익: +${fmt(earned)} (${Math.floor(away / 60)}분)`);
      }
    }
    S.lastTick = Date.now();
  } catch (e) { console.error('세이브 로드 실패', e); }
}

function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}

load();
render();
setInterval(tick, 100);
setInterval(save, 5000);
window.addEventListener('beforeunload', save);
</script>
</body>
</html>
